- job:
    name: octsim_osmo-ccid-firmware
    description: |
        octsim osmo-ccid-firmware CI - flash every build to octsim and see if
        it still works
    node: octsimtest
    parameters:
      - string:
          name: BRANCH
          description: |
                Branch of <code>osmo-ccid-firmware.git</code>, from which the
                test code (<code>test</code> directory) gets read.
          default: 'master'
      - string:
          name: EMAIL_NOTIFICATIONS
          description: For failed build notifications, set to empty to disable
          default: 'jenkins-notifications@lists.osmocom.org jsteiger@sysmocom.de acouzens@sysmocom.de'
    builders:
    - shell: |
            cd ./tests
            mkdir -p sysmo-octsim/dl
            timeout 30m ./run-tests
    scm:
      - git:
          url: https://gerrit.osmocom.org/osmo-ccid-firmware
          git-config-name: 'Jenkins Builder'
          git-config-email: 'jenkins@osmocom.org'
          skip-tag: true
          branches:
            - '$BRANCH'
    properties:
    - build-discarder:
        days-to-keep: 30
        num-to-keep: 120
    publishers:
    - email:
        notify-every-unstable-build: true
        recipients: '$EMAIL_NOTIFICATIONS'
        send-to-individuals: true
    retry-count: 3 # scm checkout
    triggers:
    - reverse:
        jobs: master-osmo-ccid-firmware,
