- job:
    node: octsimtest
    block-downstream: false
    block-upstream: false
    parameters:
      - string:
          name: EMAIL_NOTIFICATIONS
          description: For failed build notifications, set to empty to disable
          default: 'jenkins-notifications@lists.osmocom.org jsteiger@sysmocom.de acouzens@sysmocom.de'
    builders:
    - shell: |
            cd ./tests
            mkdir -p sysmo-octsim/dl
            timeout 30m ./run-tests
    concurrent: false
    description: octsim osmo-ccid-firmware CI - flash every build to octsim and see
      if it still works
    disabled: false
    execution-strategy:
      sequential: false
    name: octsim_osmo-ccid-firmware
    scm:
      - git:
          url: https://gerrit.osmocom.org/osmo-ccid-firmware
          git-config-name: 'Jenkins Builder'
          git-config-email: 'jenkins@osmocom.org'
          skip-tag: true
          branches:
            - 'master'
    properties:
    - build-blocker:
        block-level: GLOBAL
        blocking-jobs: []
        queue-scanning: DISABLED
        use-build-blocker: false
    - build-discarder:
        days-to-keep: 30
        num-to-keep: 120
    - rebuild:
        auto-rebuild: false
        rebuild-disabled: false
    publishers:
    - email:
        notify-every-unstable-build: true
        recipients: '$EMAIL_NOTIFICATIONS'
        send-to-individuals: true
    retry-count: '3'
    triggers:
    - reverse:
        jobs: master-osmo-ccid-firmware,
    - timed: H 22 * * *
    wrappers: []
